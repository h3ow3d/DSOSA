{{define "projects.html"}}
{{template "layout.html" .}}
{{end}}

{{define "content"}}
<section class="card">
  <h2>Projects</h2>
  {{if .Projects}}
  <ul>
    {{range .Projects}}
    <li>{{.Name}} — updated {{.UpdatedAt}}</li>
    {{end}}
  </ul>
  {{else}}
  <p>No projects saved yet. Project management can be added on top of the file store.</p>
  {{end}}
</section>
{{end}}
