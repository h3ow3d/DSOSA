{{define "content"}}
  <div class="page-header">
    <h2>New Project</h2>
    <a href="/projects" class="btn btn-ghost">← Back</a>
  </div>

  <div class="card">
    {{if .ErrorSummary}}
    <div class="alert alert-warn" role="alert" tabindex="-1">
      <h3>There is a problem</h3>
      <p>{{.ErrorSummary}}</p>
    </div>
    {{end}}
    <form method="post" action="/projects" class="form">
      <div class="form-row">
        <label for="name">Project Name <span class="required">*</span></label>
        <p id="name-hint" class="hint-text">Give the project a clear name you can find later.</p>
        <input type="text" id="name" name="name" required placeholder="e.g. My App Security Review" autofocus aria-describedby="name-hint" value="{{index .Form "name"}}">
      </div>
      <div class="form-row">
        <label for="client_name">Client / Organisation</label>
        <input type="text" id="client_name" name="client_name" placeholder="e.g. Acme Corp" value="{{index .Form "client_name"}}">
      </div>
      <div class="form-row">
        <label for="owner">Owner</label>
        <input type="text" id="owner" name="owner" placeholder="e.g. Jane Smith" value="{{index .Form "owner"}}">
      </div>
      <div class="form-row">
        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3" placeholder="Brief description of the project scope">{{index .Form "description"}}</textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="btn">Create Project</button>
        <a href="/projects" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
{{end}}
