<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · DSOVS Assessment Tool</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="header">
    <a href="/dashboard" class="header-brand">OWASP DSOVS Assessment Tool</a>
    <nav class="nav">
      <a href="/dashboard" class="nav-link{{if eq .Nav "dashboard"}} active{{end}}">Dashboard</a>
      <a href="/projects" class="nav-link{{if eq .Nav "projects"}} active{{end}}">Projects</a>
      <a href="/assessments" class="nav-link{{if eq .Nav "assessments"}} active{{end}}">Assessments</a>
    </nav>
  </header>
  <main class="container">
    {{block "content" .}}{{end}}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
