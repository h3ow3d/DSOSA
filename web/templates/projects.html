<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · DSOVS Assessment Tool</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="header">
    <h1>OWASP DSOVS Assessment Tool</h1>
    <nav><a href="/dashboard">Dashboard</a> <a href="/projects">Projects</a></nav>
  </header>
  <main class="container">
    <section class="card">
      <h2>Projects</h2>
      {{if .Projects}}
      <ul>{{range .Projects}}<li>{{.Name}} — updated {{.UpdatedAt}}</li>{{end}}</ul>
      {{else}}
      <p>No projects saved yet. Project management can be added on top of the file store.</p>
      {{end}}
    </section>
  </main>
</body>
</html>
