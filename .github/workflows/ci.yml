name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build binary
        run: go build -o dsovs ./cmd/dsovs

      - name: Build Docker image
        run: docker build -t dsovs:ci .

      - name: Docker smoke test
        run: |
          docker run -d --name dsovs-smoke -p 8080:8080 dsovs:ci
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/; then
              echo "Smoke test passed"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "Smoke test failed after 10 attempts"
              docker logs dsovs-smoke
              exit 1
            fi
            sleep 2
          done
          docker stop dsovs-smoke
          docker rm dsovs-smoke
